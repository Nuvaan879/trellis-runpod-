name: Build and push TRELLIS image

# Build the amd64 image on GitHub's x86 runners (no emulation) and push to Docker Hub.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        required: true
        default: "v1.0.1"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "inference.py"
      - "handler.py"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # CUDA extensions (flash-attn etc.) compile from source
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub runners ship with ~14GB free. This image is ~15-20GB, so reclaim
      # space by deleting preinstalled toolchains we don't need (~30GB+ recovered).
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo docker image prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/trellis-api:${{ github.event.inputs.tag || 'v1.0.1' }}
